name: codex-ci-check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Bootstrap FVM and OHOS Flutter
        shell: bash
        env:
          FVM_FLUTTER_VERSION: ohos_flutter
          OHOS_FLUTTER_GIT_URL: ${{ vars.OHOS_FLUTTER_GIT_URL }}
          OHOS_FLUTTER_GIT_REF: ${{ vars.OHOS_FLUTTER_GIT_REF }}
        run: |
          sh scripts/bootstrap_ci_env.sh

      - name: Run Flutter checks
        shell: bash
        run: |
          SKIP_BOOTSTRAP=1 sh scripts/check_ci.sh
